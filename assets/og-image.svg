<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Weekly Tech Trend Analyst — 주간 기술 트렌드 분석">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a6b" />
      <stop offset="100%" stop-color="#0f2547" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" fill-opacity="0.08" />
    </pattern>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- 상단 좌측 작은 라벨 -->
  <g font-family="'Pretendard Variable', Pretendard, -apple-system, sans-serif">
    <rect x="80" y="80" width="10" height="10" fill="#ffffff" fill-opacity="0.85" />
    <text x="104" y="91" font-size="20" font-weight="500" fill="#ffffff" fill-opacity="0.85" letter-spacing="0.06em">DAILY · WEEKLY BRIEFING</text>
  </g>

  <!-- 메인 타이틀 -->
  <g font-family="'Noto Serif KR', Georgia, 'Times New Roman', serif">
    <text x="80" y="295" font-size="92" font-weight="700" fill="#ffffff" letter-spacing="-0.01em">Weekly Tech Trend</text>
    <text x="80" y="395" font-size="92" font-weight="700" fill="#ffffff" letter-spacing="-0.01em">Analyst</text>
  </g>

  <!-- 한글 서브타이틀 -->
  <g font-family="'Pretendard Variable', Pretendard, -apple-system, sans-serif">
    <text x="80" y="470" font-size="34" font-weight="400" fill="#ffffff" fill-opacity="0.8" letter-spacing="-0.005em">주간 기술 트렌드 분석</text>
    <text x="80" y="513" font-size="22" font-weight="400" fill="#ffffff" fill-opacity="0.55" letter-spacing="0.01em">제조업 · 생산기술 관점의 기술 동향 리포트</text>
  </g>

  <!-- 좌하단 도메인 -->
  <g font-family="'Pretendard Variable', Pretendard, -apple-system, sans-serif">
    <text x="80" y="585" font-size="18" font-weight="500" fill="#ffffff" fill-opacity="0.55" letter-spacing="0.04em">onyoupark.github.io/weekly-tech-trend</text>
  </g>

  <!-- 우하단 미니멀 라인 그래픽 (트렌드 라인 모티프) -->
  <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="900,520 950,490 1000,505 1050,440 1100,460 1150,395" />
  </g>
  <g fill="#ffffff" fill-opacity="0.55">
    <circle cx="900" cy="520" r="4" />
    <circle cx="950" cy="490" r="4" />
    <circle cx="1000" cy="505" r="4" />
    <circle cx="1050" cy="440" r="4" />
    <circle cx="1100" cy="460" r="4" />
    <circle cx="1150" cy="395" r="5" fill="#ffffff" fill-opacity="0.85" />
  </g>

  <!-- 우상단 절제된 액센트 -->
  <g stroke="#ffffff" stroke-opacity="0.18" stroke-width="1" fill="none">
    <line x1="1080" y1="80" x2="1120" y2="80" />
    <line x1="1120" y1="80" x2="1120" y2="120" />
  </g>
</svg>
