  <script>
    /* 테마 토글 */
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;

      function updateIcon() {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        btn.textContent = current === 'dark' ? '☀' : '🌙';
        btn.setAttribute(
          'aria-label',
          current === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환'
        );
      }

      updateIcon();

      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
        updateIcon();
      });
    })();
  </script>

  <script>
    /* 주간 브리핑 종합 목록 (type === 'weekly') */
    (function () {
      'use strict';

      var TYPE = 'weekly';
      var EMPTY_MSG = '아직 게시된 주간 종합이 없습니다.';
      var SHOW_TAGS = false;

      /* 읽음 표시 — localStorage 기반 (시크릿 모드 안전) */
      var READ_KEY = 'wtt:read-articles';
      function getReadSlugs() {
        try {
          var v = JSON.parse(localStorage.getItem(READ_KEY) || '[]');
          return Array.isArray(v) ? v : [];
        } catch (e) { return []; }
      }
      function isRead(slug) {
        return getReadSlugs().indexOf(slug) !== -1;
      }

      /* type이 없는 기존 항목은 daily로 취급 */
      function getType(a) { return (a && a.type) || 'daily'; }

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function isValidSlug(slug) {
        return /^[A-Za-z0-9._-]+$/.test(slug || '');
      }

      function safeArticleHref(slug) {
        if (!isValidSlug(slug)) return '#';
        return './article.html?slug=' + encodeURIComponent(slug);
      }

      var listEl = document.getElementById('brief-list');

      function cardHtml(a) {
        var readClass = isRead(a.slug || '') ? ' is-read' : '';
        var href = safeArticleHref(a.slug);
        var period = (a.period && String(a.period).trim()) ? a.period : (a.date || '');
        var tagHtml = '';
        if (SHOW_TAGS) {
          var tags = Array.isArray(a.tags) ? a.tags.slice(0, 5) : [];
          tagHtml = tags.map(function (t) {
            return '<span>' + escapeHtml(t) + '</span>';
          }).join('');
        }
        return '' +
          '<li class="brief-card' + readClass + '">' +
            '<a class="brief-card__link" href="' + escapeHtml(href) + '">' +
              '<p class="brief-card__period">' + escapeHtml(period) + '</p>' +
              '<p class="brief-card__date">' + escapeHtml(a.date || '') + '</p>' +
              '<p class="brief-card__summary">' + escapeHtml(a.summary || '') + '</p>' +
              (tagHtml ? '<p class="brief-card__tags">' + tagHtml + '</p>' : '') +
            '</a>' +
          '</li>';
      }

      fetch('./articles/index.json', { cache: 'no-cache' })
        .then(function (res) {
          if (!res.ok) throw new Error('index.json fetch 실패: ' + res.status);
          return res.json();
        })
        .then(function (data) {
          var all = (data && Array.isArray(data.articles)) ? data.articles : [];
          var list = all.filter(function (a) { return getType(a) === TYPE; });
          list.sort(function (a, b) {
            return (b.date || '').localeCompare(a.date || '');
          });
          if (list.length === 0) {
            listEl.innerHTML = '<li class="notice">' + EMPTY_MSG + '</li>';
            return;
          }
          listEl.innerHTML = list.map(cardHtml).join('');
        })
        .catch(function (err) {
          console.error(err);
          listEl.innerHTML = '<li class="notice">기사 목록을 불러오지 못했습니다. 로컬에서 보고 있다면 정적 서버(예: <code>python -m http.server</code>)로 실행해주세요.</li>';
        });
    })();
  </script>
