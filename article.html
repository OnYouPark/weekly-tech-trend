<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO (JS가 기사 로드 후 동적으로 갱신) -->
  <meta name="description" content="주간 기술 트렌드 분석 기사." />
  <meta name="keywords" content="제조업, 기술 트렌드, 스마트제조, 로보틱스, 디지털전환, 일일 브리핑" />

  <link rel="canonical" href="https://onyoupark.github.io/weekly-tech-trend/article.html" />

  <!-- Open Graph -->

  <meta property="og:locale" content="ko_KR" />
  <meta property="og:title" content="기사 | Weekly Tech Trend Analyst" />
  <meta property="og:description" content="주간 기술 트렌드 분석 기사." />

  <script>
    /* FOUC 방지: 본문 렌더 이전에 테마 즉시 적용 */
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

  <link rel="stylesheet" href="./assets/style.css">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="reading-progress" aria-hidden="true">
    <div class="reading-progress__bar" id="reading-progress-bar"></div>
  </div>

  <main class="wrap wrap--article" id="article-wrap">
    <header class="site-header">
      <div class="site-header__main">
        <h1 class="site-title"><a href="./index.html">Weekly Tech Trend Analyst</a></h1>
        <p class="site-subtitle">주간 기술 트렌드 분석</p>
        <nav class="site-nav" aria-label="사이트 네비게이션">
          <a class="site-nav__link" href="./index.html">홈</a>
          <span class="site-nav__sep" aria-hidden="true">·</span>
          <a class="site-nav__link" href="./archive.html">아카이브</a>
        </nav>
      </div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="테마 전환">🌙</button>
    </header>

    <div class="article-top">
      <a class="back-link" href="./index.html">← 목록으로</a>
      <button id="copy-link" class="copy-link" type="button" aria-label="현재 페이지 URL 복사">🔗 링크 복사</button>
    </div>

    <div class="article-layout" id="article-layout">
      <div class="article-main">
        <article id="article-root">
          <p class="notice">기사를 불러오는 중입니다…</p>
        </article>
        <section class="comments-section" hidden aria-label="댓글">
          <h2 class="comments-section__title">댓글</h2>
          <p class="comments-section__intro">
            이름을 입력하고 자유롭게 의견을 남길 수 있습니다. (로그인 불필요 · 댓글은 검토 후 게시됩니다)
          </p>
          <div id="cusdis_thread"></div>
        </section>
      </div>
      <aside class="toc toc--side" id="toc-side" hidden>
        <p class="toc__title">목차</p>
        <ul class="toc__list" data-toc-list="side"></ul>
      </aside>
    </div>

    <footer class="site-footer">Powered by Claude × GitHub Pages</footer>
  </main>

  <script>
    /* ========== 테마 토글 ========== */
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;

      function updateIcon() {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        btn.textContent = current === 'dark' ? '☀' : '🌙';
        btn.setAttribute(
          'aria-label',
          current === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환'
        );
      }

      updateIcon();

      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
        updateIcon();
        if (typeof window.updateCusdisTheme === 'function') {
          window.updateCusdisTheme(next);
        }
      });
    })();

    /* ========== Cusdis 댓글 ========== */
    function initCusdis(slug, articleTitle) {
      try {
        var thread = document.getElementById('cusdis_thread');
        if (!thread) return;

        var theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';

        thread.setAttribute('data-host', 'https://cusdis.com');
        thread.setAttribute('data-app-id', '4eeec65c-dc8b-4c9d-890a-36a3c7c7d6f6');
        thread.setAttribute('data-page-id', slug);
        thread.setAttribute('data-page-url', window.location.href);
        thread.setAttribute('data-page-title', articleTitle);
        thread.setAttribute('data-theme', theme);

        var section = document.querySelector('.comments-section');
        if (section) section.hidden = false;

        if (!document.querySelector('script[src*="cusdis.es.js"]')) {
          var script = document.createElement('script');
          script.src = 'https://cusdis.com/js/cusdis.es.js';
          script.async = true;
          script.defer = true;
          script.onerror = function () {
            console.warn('Cusdis 스크립트 로드 실패');
          };
          document.body.appendChild(script);
        }

        observeCusdisIframe();
      } catch (err) {
        console.warn('Cusdis init failed:', err);
      }
    }

    function observeCusdisIframe() {
      var thread = document.getElementById('cusdis_thread');
      if (!thread) return;

      var observer = new MutationObserver(function () {
        var iframe = thread.querySelector('iframe');
        if (iframe) {
          /* 초기에만 최소 높이 부여, 이후엔 postMessage가 정확한 값으로 갱신 */
          if (!iframe.style.height || parseInt(iframe.style.height, 10) < 200) {
            iframe.style.height = '600px';
          }
          observer.disconnect();
        }
      });

      observer.observe(thread, { childList: true, subtree: true });
    }

    /* Cusdis iframe 자동 리사이즈 보강 — 페이지당 1회 등록 */
    window.addEventListener('message', function (event) {
      if (event.origin !== 'https://cusdis.com') return;
      var data = event.data;
      if (!data || data.from !== 'cusdis') return;

      var iframe = document.querySelector('#cusdis_thread iframe');
      if (!iframe) return;

      if (data.event === 'resize' && typeof data.data === 'number') {
        iframe.style.height = data.data + 'px';
      } else if (typeof data.height === 'number') {
        iframe.style.height = data.height + 'px';
      }
    });

    window.updateCusdisTheme = function (theme) {
      try {
        if (window.CUSDIS && typeof window.CUSDIS.setTheme === 'function') {
          window.CUSDIS.setTheme(theme);
          return;
        }
        /* Fallback: data-theme 갱신 후 iframe 재로드 */
        var thread = document.getElementById('cusdis_thread');
        if (thread) {
          thread.setAttribute('data-theme', theme);
          var iframe = thread.querySelector('iframe');
          if (iframe) {
            var src = iframe.src;
            iframe.src = src;
          }
        }
      } catch (err) {
        console.warn('Cusdis theme update failed:', err);
      }
    };

    /* ========== URL 복사 버튼 ========== */
    (function () {
      var btn = document.getElementById('copy-link');
      if (!btn) return;

      var originalText = btn.textContent;
      var resetTimer = null;

      function flashCopied() {
        btn.textContent = '✓ 복사됨';
        btn.classList.add('is-copied');
        if (resetTimer) clearTimeout(resetTimer);
        resetTimer = setTimeout(function () {
          btn.textContent = originalText;
          btn.classList.remove('is-copied');
        }, 2000);
      }

      function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.top = '-1000px';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try {
          var ok = document.execCommand('copy');
          if (ok) flashCopied();
          else console.warn('execCommand copy returned false');
        } catch (e) {
          console.warn('복사 실패:', e);
        }
        document.body.removeChild(ta);
      }

      btn.addEventListener('click', function () {
        var url = window.location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(flashCopied).catch(function (err) {
            console.warn('clipboard API 실패, 폴백 사용:', err);
            fallbackCopy(url);
          });
        } else {
          fallbackCopy(url);
        }
      });
    })();

    /* ========== 읽기 진행률 바 ========== */
    function setupReadingProgress(articleBodyEl) {
      var bar = document.getElementById('reading-progress-bar');
      if (!bar || !articleBodyEl) return;

      var ticking = false;

      function update() {
        ticking = false;
        var rect = articleBodyEl.getBoundingClientRect();
        var winH = window.innerHeight;

        if (rect.top > 0) {
          bar.style.width = '0%';
          return;
        }
        if (rect.bottom <= winH) {
          bar.style.width = '100%';
          return;
        }
        var totalDistance = rect.height - winH;
        if (totalDistance <= 0) {
          bar.style.width = '100%';
          return;
        }
        var scrolled = -rect.top;
        var progress = (scrolled / totalDistance) * 100;
        if (progress < 0) progress = 0;
        if (progress > 100) progress = 100;
        bar.style.width = progress + '%';
      }

      function onScroll() {
        if (!ticking) {
          window.requestAnimationFrame(update);
          ticking = true;
        }
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', onScroll);
      update();
    }

    /* ========== 자동 TOC ========== */
    function buildTOC(articleBodyEl) {
      var headings = articleBodyEl.querySelectorAll('h2, h3');
      if (!headings.length) return;

      var items = [];
      headings.forEach(function (h, idx) {
        var id = 'heading-' + (idx + 1);
        h.id = id;
        items.push({
          id: id,
          text: h.textContent || '',
          level: h.tagName.toLowerCase()
        });
      });

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      var listHtml = items.map(function (it) {
        var cls = 'toc__item' + (it.level === 'h3' ? ' toc__item--h3' : '');
        return '<li class="' + cls + '"><a href="#' + it.id +
          '" data-toc-target="' + it.id + '">' + escapeHtml(it.text) + '</a></li>';
      }).join('');

      /* 사이드바 TOC (≥1024px) */
      var sideAside = document.getElementById('toc-side');
      var sideList = sideAside && sideAside.querySelector('[data-toc-list="side"]');
      if (sideList) {
        sideList.innerHTML = listHtml;
        sideAside.hidden = false;
        document.getElementById('article-wrap').classList.add('has-toc');
      }

      /* 인라인 TOC (모바일) — article-header와 article-body 사이에 삽입 */
      var details = document.createElement('details');
      details.className = 'toc toc--inline';
      details.innerHTML =
        '<summary>📑 목차</summary>' +
        '<ul class="toc__list" data-toc-list="inline">' + listHtml + '</ul>';

      var bodyEl = document.querySelector('.article-body');
      if (bodyEl && bodyEl.parentNode) {
        bodyEl.parentNode.insertBefore(details, bodyEl);
      }

      /* TOC 링크 클릭 → smooth scroll */
      var allTocLinks = document.querySelectorAll('[data-toc-target]');
      allTocLinks.forEach(function (a) {
        a.addEventListener('click', function (e) {
          var targetId = a.getAttribute('data-toc-target');
          var target = document.getElementById(targetId);
          if (!target) return;
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          if (history && history.replaceState) {
            history.replaceState(null, '', '#' + targetId);
          }
        });
      });

      /* 현재 화면에 보이는 헤더 추적 → active 클래스 */
      if ('IntersectionObserver' in window) {
        var visible = new Set();

        function applyActive() {
          var activeId = null;
          var minTop = Infinity;
          headings.forEach(function (h) {
            if (visible.has(h.id)) {
              var r = h.getBoundingClientRect();
              if (r.top < minTop) {
                minTop = r.top;
                activeId = h.id;
              }
            }
          });
          allTocLinks.forEach(function (a) {
            if (a.getAttribute('data-toc-target') === activeId) {
              a.classList.add('active');
            } else {
              a.classList.remove('active');
            }
          });
        }

        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) visible.add(entry.target.id);
            else visible.delete(entry.target.id);
          });
          applyActive();
        }, {
          rootMargin: '-80px 0px -60% 0px',
          threshold: 0
        });

        headings.forEach(function (h) { observer.observe(h); });
      }
    }

    /* ========== 기사 렌더링 ========== */
    (function () {
      'use strict';

      var rootEl = document.getElementById('article-root');

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function getSlug() {
        var params = new URLSearchParams(window.location.search);
        var slug = params.get('slug') || '';
        if (!/^[A-Za-z0-9._-]+$/.test(slug)) return '';
        return slug;
      }

      function showNotFound(message) {
        rootEl.innerHTML =
          '<p class="notice">' + escapeHtml(message || '기사를 찾을 수 없습니다.') +
          ' <a href="./index.html">목록으로 돌아가기</a></p>';
      }

      function stripFrontmatter(md) {
        if (!md) return '';
        var trimmed = md.replace(/^﻿/, '');
        if (!/^---\s*\r?\n/.test(trimmed)) return trimmed;
        var end = trimmed.indexOf('\n---', 3);
        if (end === -1) return trimmed;
        var rest = trimmed.slice(end + 4);
        return rest.replace(/^\r?\n/, '');
      }

      function updateMetaTags(article) {
        if (!article) return;
        var title = article.title || '(제목 없음)';
        var summary = article.summary || '주간 기술 트렌드 분석 기사.';
        var url = window.location.href;

        document.title = title + ' | Weekly Tech Trend Analyst';

        function setAttr(selector, attr, value) {
          var el = document.querySelector(selector);
          if (el) el.setAttribute(attr, value);
        }

        setAttr('meta[name="description"]', 'content', summary);
        setAttr('meta[property="og:title"]', 'content', title);
        setAttr('meta[property="og:description"]', 'content', summary);
        setAttr('meta[property="og:url"]', 'content', url);
        setAttr('meta[name="twitter:title"]', 'content', title);
        setAttr('meta[name="twitter:description"]', 'content', summary);
        setAttr('link[rel="canonical"]', 'href', url);
      }

      function renderArticle(meta, markdown) {
        var title = (meta && meta.title) || '(제목 없음)';
        updateMetaTags(meta);

        var tags = Array.isArray(meta && meta.tags) ? meta.tags : [];
        var tagHtml = tags.map(function (t) {
          return '<span>' + escapeHtml(t) + '</span>';
        }).join('');

        var body = stripFrontmatter(markdown);

        if (window.marked && marked.setOptions) {
          marked.setOptions({
            gfm: true,
            breaks: false,
            headerIds: false,
            mangle: false
          });
          // 단일 ~ 가 strikethrough 로 잘못 해석되는 문제 보정
          // (한국어 본문 숫자 범위 "3~8pt" 등이 취소선으로 표시되지 않도록 del 토큰을 텍스트로 환원)
          if (marked.use) {
            marked.use({
              walkTokens: function (token) {
                if (token.type === 'del' && token.raw && token.raw.substr(0, 2) !== '~~') {
                  token.type = 'text';
                  token.text = token.raw;
                  if (token.tokens) { delete token.tokens; }
                }
              }
            });
          }
        }

        var bodyHtml = window.marked ? marked.parse(body) : escapeHtml(body);

        rootEl.innerHTML = '' +
          '<header class="article-header">' +
            '<h1 class="article-title">' + escapeHtml(title) + '</h1>' +
            '<div class="article-meta">' +
              '<span class="article-meta__date">' + escapeHtml((meta && meta.date) || '') + '</span>' +
              (tagHtml ? '<span class="article-meta__tags">' + tagHtml + '</span>' : '') +
            '</div>' +
          '</header>' +
          '<div class="article-body">' + bodyHtml + '</div>';

        var articleBody = rootEl.querySelector('.article-body');
        buildTOC(articleBody);
        setupReadingProgress(articleBody);

        try { initCusdis(slug, title); } catch (e) { console.warn('Cusdis init 예외:', e); }
      }

      var slug = getSlug();
      if (!slug) {
        showNotFound('기사를 찾을 수 없습니다.');
        return;
      }

      fetch('./articles/index.json', { cache: 'no-cache' })
        .then(function (res) {
          if (!res.ok) throw new Error('index.json fetch 실패');
          return res.json();
        })
        .then(function (data) {
          var list = (data && Array.isArray(data.articles)) ? data.articles : [];
          var meta = list.find(function (a) { return a.slug === slug; });
          if (!meta) {
            showNotFound('기사를 찾을 수 없습니다.');
            return null;
          }
          return fetch('./articles/' + encodeURIComponent(slug) + '.md', { cache: 'no-cache' })
            .then(function (res) {
              if (!res.ok) throw new Error('markdown fetch 실패: ' + res.status);
              return res.text();
            })
            .then(function (md) {
              renderArticle(meta, md);
            });
        })
        .catch(function (err) {
          console.error(err);
          showNotFound('기사를 불러오지 못했습니다.');
        });
    })();
  </script>

  <script defer src="https://cloud.umami.is/script.js" data-website-id="7d8b07b6-b3b4-4427-8046-96f30f6761b3"></script>
