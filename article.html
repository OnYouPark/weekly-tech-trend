    (function () {

        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

  <!-- Mermaid 11.x (ESM, on-demand 렌더) -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    window.mermaid = mermaid;

    var initialTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default';
    var themeVars = {
      primaryColor: '#1a3a6b',
      primaryTextColor: '#ffffff',
      primaryBorderColor: '#1a3a6b',
      lineColor: '#6b7280',
      secondaryColor: '#f5f5f5',
      tertiaryColor: '#ffffff',
      fontFamily: '"Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, sans-serif'
    };
    mermaid.initialize({
      startOnLoad: false,
      theme: initialTheme,
      securityLevel: 'strict',
      themeVariables: themeVars
    });

    /* 다크모드 토글 시 재초기화 + 재렌더 */
    window.refreshMermaidTheme = function (theme) {
      try {
        var nodes = document.querySelectorAll('.mermaid');
        if (!nodes.length) return;
        nodes.forEach(function (n) {
          var src = n.getAttribute('data-source') || n.textContent.trim();
          if (!n.getAttribute('data-source')) n.setAttribute('data-source', src);
          n.removeAttribute('data-processed');
          n.textContent = src;
        });
        mermaid.initialize({
          startOnLoad: false,
          theme: theme === 'dark' ? 'dark' : 'default',
          securityLevel: 'strict',
          themeVariables: themeVars
        });
        mermaid.run({ querySelector: '.mermaid' });
      } catch (e) { console.warn('mermaid theme refresh failed:', e); }
    };

    window.dispatchEvent(new CustomEvent('mermaid-loaded'));
  </script>

  <script>
    /* ========== 테마 토글 ========== */
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;

      function updateIcon() {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        btn.textContent = current === 'dark' ? '☀' : '🌙';
        btn.setAttribute(
          'aria-label',
          current === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환'
        );
      }

      updateIcon();

      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
        updateIcon();
        if (typeof window.updateCusdisTheme === 'function') {
          window.updateCusdisTheme(next);
        }
        if (typeof window.refreshMermaidTheme === 'function') {
          window.refreshMermaidTheme(next);
        }
      });
    })();

    /* ========== Cusdis 댓글 ========== */
    function initCusdis(slug, articleTitle) {
      try {
        var thread = document.getElementById('cusdis_thread');
        if (!thread) return;

        var theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';

        thread.setAttribute('data-host', 'https://cusdis.com');
        thread.setAttribute('data-app-id', '4eeec65c-dc8b-4c9d-890a-36a3c7c7d6f6');
        thread.setAttribute('data-page-id', slug);
        thread.setAttribute('data-page-url', window.location.href);
        thread.setAttribute('data-page-title', articleTitle);
        thread.setAttribute('data-theme', theme);

        var section = document.querySelector('.comments-section');
        if (section) section.hidden = false;

        if (!document.querySelector('script[src*="cusdis.es.js"]')) {
          var script = document.createElement('script');
          script.src = 'https://cusdis.com/js/cusdis.es.js';
          script.async = true;
          script.defer = true;
          script.onerror = function () {
            console.warn('Cusdis 스크립트 로드 실패');
          };
          document.body.appendChild(script);
        }

        observeCusdisIframe();
      } catch (err) {
        console.warn('Cusdis init failed:', err);
      }
    }

    function observeCusdisIframe() {
      var thread = document.getElementById('cusdis_thread');
      if (!thread) return;

      var observer = new MutationObserver(function () {
        var iframe = thread.querySelector('iframe');
        if (iframe) {
          /* 초기에만 최소 높이 부여, 이후엔 postMessage가 정확한 값으로 갱신 */
          if (!iframe.style.height || parseInt(iframe.style.height, 10) < 200) {
            iframe.style.height = '600px';
          }
          observer.disconnect();
        }
      });

      observer.observe(thread, { childList: true, subtree: true });
    }

    /* Cusdis iframe 자동 리사이즈 보강 — 페이지당 1회 등록 */
    window.addEventListener('message', function (event) {
      if (event.origin !== 'https://cusdis.com') return;
      var data = event.data;
      if (!data || data.from !== 'cusdis') return;

      var iframe = document.querySelector('#cusdis_thread iframe');
      if (!iframe) return;

      if (data.event === 'resize' && typeof data.data === 'number') {
        iframe.style.height = data.data + 'px';
      } else if (typeof data.height === 'number') {
        iframe.style.height = data.height + 'px';
      }
    });

    window.updateCusdisTheme = function (theme) {
      try {
        if (window.CUSDIS && typeof window.CUSDIS.setTheme === 'function') {
          window.CUSDIS.setTheme(theme);
          return;
        }
        /* Fallback: data-theme 갱신 후 iframe 재로드 */
        var thread = document.getElementById('cusdis_thread');
        if (thread) {
          thread.setAttribute('data-theme', theme);
          var iframe = thread.querySelector('iframe');
          if (iframe) {
            var src = iframe.src;
            iframe.src = src;
          }
        }
      } catch (err) {
        console.warn('Cusdis theme update failed:', err);
      }
    };

    /* ========== URL 복사 버튼 ========== */
    (function () {
      var btn = document.getElementById('copy-link');
      if (!btn) return;

      var originalText = btn.textContent;
      var resetTimer = null;

      function flashCopied() {
        btn.textContent = '✓ 복사됨';
        btn.classList.add('is-copied');
        if (resetTimer) clearTimeout(resetTimer);
        resetTimer = setTimeout(function () {
          btn.textContent = originalText;
          btn.classList.remove('is-copied');
        }, 2000);
      }

      function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.top = '-1000px';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try {
          var ok = document.execCommand('copy');
          if (ok) flashCopied();
          else console.warn('execCommand copy returned false');
        } catch (e) {
          console.warn('복사 실패:', e);
        }
        document.body.removeChild(ta);
      }

      btn.addEventListener('click', function () {
        var url = window.location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(flashCopied).catch(function (err) {
            console.warn('clipboard API 실패, 폴백 사용:', err);
            fallbackCopy(url);
          });
        } else {
          fallbackCopy(url);
        }
      });
    })();

    /* ========== 읽기 진행률 바 ========== */
    function setupReadingProgress(articleBodyEl) {
      var bar = document.getElementById('reading-progress-bar');
      if (!bar || !articleBodyEl) return;

      var ticking = false;

      function update() {
        ticking = false;
        var rect = articleBodyEl.getBoundingClientRect();
        var winH = window.innerHeight;

        if (rect.top > 0) {
          bar.style.width = '0%';
          return;
        }
        if (rect.bottom <= winH) {
          bar.style.width = '100%';
          return;
        }
        var totalDistance = rect.height - winH;
        if (totalDistance <= 0) {
          bar.style.width = '100%';
          return;
        }
        var scrolled = -rect.top;
        var progress = (scrolled / totalDistance) * 100;
        if (progress < 0) progress = 0;
        if (progress > 100) progress = 100;
        bar.style.width = progress + '%';
      }

      function onScroll() {
        if (!ticking) {
          window.requestAnimationFrame(update);
          ticking = true;
        }
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', onScroll);
      update();
    }

    /* ========== 자동 TOC ========== */
    function buildTOC(articleBodyEl) {
      var headings = articleBodyEl.querySelectorAll('h2, h3');
      if (!headings.length) return;

      var items = [];
      headings.forEach(function (h, idx) {
        var id = 'heading-' + (idx + 1);
        h.id = id;
        items.push({
          id: id,
          text: h.textContent || '',
          level: h.tagName.toLowerCase()
        });
      });

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      var listHtml = items.map(function (it) {
        var cls = 'toc__item' + (it.level === 'h3' ? ' toc__item--h3' : '');
        return '<li class="' + cls + '"><a href="#' + it.id +
          '" data-toc-target="' + it.id + '">' + escapeHtml(it.text) + '</a></li>';
      }).join('');

      /* 사이드바 TOC (≥1024px) */
      var sideAside = document.getElementById('toc-side');
      var sideList = sideAside && sideAside.querySelector('[data-toc-list="side"]');
      if (sideList) {
        sideList.innerHTML = listHtml;
        sideAside.hidden = false;
        document.getElementById('article-wrap').classList.add('has-toc');
      }

      /* 인라인 TOC (모바일) — article-header와 article-body 사이에 삽입 */
      var details = document.createElement('details');
      details.className = 'toc toc--inline';
      details.innerHTML =
        '<summary>📑 목차</summary>' +
        '<ul class="toc__list" data-toc-list="inline">' + listHtml + '</ul>';

      var bodyEl = document.querySelector('.article-body');
      if (bodyEl && bodyEl.parentNode) {
        bodyEl.parentNode.insertBefore(details, bodyEl);
      }

      /* TOC 링크 클릭 → smooth scroll */
      var allTocLinks = document.querySelectorAll('[data-toc-target]');
      allTocLinks.forEach(function (a) {
        a.addEventListener('click', function (e) {
          var targetId = a.getAttribute('data-toc-target');
          var target = document.getElementById(targetId);
          if (!target) return;
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          if (history && history.replaceState) {
            history.replaceState(null, '', '#' + targetId);
          }
        });
      });

      /* 현재 화면에 보이는 헤더 추적 → active 클래스 */
      if ('IntersectionObserver' in window) {
        var visible = new Set();

        function applyActive() {
          var activeId = null;
          var minTop = Infinity;
          headings.forEach(function (h) {
            if (visible.has(h.id)) {
              var r = h.getBoundingClientRect();
              if (r.top < minTop) {
                minTop = r.top;
                activeId = h.id;
              }
            }
          });
          allTocLinks.forEach(function (a) {
            if (a.getAttribute('data-toc-target') === activeId) {
              a.classList.add('active');
            } else {
              a.classList.remove('active');
            }
          });
        }

        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) visible.add(entry.target.id);
            else visible.delete(entry.target.id);
          });
          applyActive();
        }, {
          rootMargin: '-80px 0px -60% 0px',
          threshold: 0
        });

        headings.forEach(function (h) { observer.observe(h); });
      }
    }

    /* ========== 기사 렌더링 ========== */
    (function () {
      'use strict';

      var rootEl = document.getElementById('article-root');
      var allArticles = [];  // index.json fetch 결과 캐시 (관련 기사·이전다음 네비에서 재사용)

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function getSlug() {
        var params = new URLSearchParams(window.location.search);
        var slug = params.get('slug') || '';
        if (!/^[A-Za-z0-9._-]+$/.test(slug)) return '';
        return slug;
      }

      function showNotFound(message) {
        rootEl.innerHTML =
          '<p class="notice">' + escapeHtml(message || '기사를 찾을 수 없습니다.') +
          ' <a href="./index.html">목록으로 돌아가기</a></p>';
      }

      function stripFrontmatter(md) {
        if (!md) return '';
        var trimmed = md.replace(/^﻿/, '');
        if (!/^---\s*\r?\n/.test(trimmed)) return trimmed;
        var end = trimmed.indexOf('\n---', 3);
        if (end === -1) return trimmed;
        var rest = trimmed.slice(end + 4);
        return rest.replace(/^\r?\n/, '');
      }

      /* 외부 링크 새 탭 + ↗ 아이콘 (본문 영역 한정) */
      function decorateExternalLinks(rootElement) {
        if (!rootElement) return;
        var links = rootElement.querySelectorAll('a[href^="http"]');
        var currentHost = window.location.hostname;
        links.forEach(function (link) {
          try {
            var linkHost = new URL(link.href).hostname;
            if (linkHost && linkHost !== currentHost) {
              link.setAttribute('target', '_blank');
              link.setAttribute('rel', 'noopener noreferrer');
              if (!link.querySelector('.external-link-icon')) {
                var icon = document.createElement('span');
                icon.className = 'external-link-icon';
                icon.setAttribute('aria-hidden', 'true');
                icon.innerHTML =
                  '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" ' +
                  'stroke="currentColor" stroke-width="1.5" stroke-linecap="round" ' +
                  'stroke-linejoin="round">' +
                  '<path d="M3 9 L9 3"/><path d="M5 3 H9 V7"/></svg>';
                link.appendChild(icon);
              }
            }
          } catch (e) { /* invalid URL skip */ }
        });
      }

      /* Callout 박스 — blockquote 첫 줄 패턴 매칭으로 className 부여 */
      function decorateCallouts(rootElement) {
        if (!rootElement) return;
        var quotes = rootElement.querySelectorAll('blockquote');
        quotes.forEach(function (bq) {
          var firstP = bq.querySelector('p');
          if (!firstP) return;
          var t = (firstP.textContent || '').trim();
          if (t.indexOf('📌 핵심') === 0) {
            bq.classList.add('callout-key');
          } else if (t.indexOf('⚠️ 주의') === 0 || t.indexOf('⚠ 주의') === 0) {
            bq.classList.add('callout-warn');
          } else if (t.indexOf('💡 시사점') === 0) {
            bq.classList.add('callout-implication');
          }
        });
      }

      /* 참고자료 섹션의 ul/ol → 카드 그리드 변환 */
      function transformReferences(rootElement) {
        if (!rootElement) return;
        var REF_TITLES = ['참고자료', '출처', '원문 자료', '참고문헌', '출처 (통합)'];
        var headings = rootElement.querySelectorAll('h2');
        headings.forEach(function (h2) {
          var t = (h2.textContent || '').trim();
          if (REF_TITLES.indexOf(t) === -1) return;
          var sib = h2.nextElementSibling;
          while (sib && sib.tagName !== 'UL' && sib.tagName !== 'OL' && sib.tagName !== 'H2') {
            sib = sib.nextElementSibling;
          }
          if (!sib || (sib.tagName !== 'UL' && sib.tagName !== 'OL')) return;
          var items = sib.querySelectorAll(':scope > li');
          if (!items.length) return;
          var grid = document.createElement('div');
          grid.className = 'reference-grid';
          var anyCard = false;
          items.forEach(function (li) {
            var a = li.querySelector('a[href]');
            if (!a) return;
            var href = a.getAttribute('href');
            var title = (a.textContent || '').trim();
            var hostname = '';
            try { hostname = new URL(href, window.location.href).hostname; } catch (e) {}
            if (!hostname) return;
            var card = document.createElement('a');
            card.className = 'reference-card';
            card.href = href;
            card.target = '_blank';
            card.rel = 'noopener noreferrer';
            card.innerHTML =
              '<img class="reference-card__favicon" ' +
                'src="https://www.google.com/s2/favicons?domain=' + encodeURIComponent(hostname) + '&sz=32" ' +
                'alt="" loading="lazy" ' +
                'onerror="this.style.display=\'none\'">' +
              '<div class="reference-card__content">' +
                '<div class="reference-card__title">' + escapeHtml(title) + '</div>' +
                '<div class="reference-card__domain">' + escapeHtml(hostname) + '</div>' +
              '</div>';
            grid.appendChild(card);
            anyCard = true;
          });
          if (anyCard) {
            sib.parentNode.replaceChild(grid, sib);
          }
        });
      }

      /* Mermaid 렌더 — ESM 모듈 로드 후 안전하게 호출 */
      function runMermaid() {
        if (!window.mermaid) {
          window.addEventListener('mermaid-loaded', runMermaid, { once: true });
          return;
        }
        var nodes = document.querySelectorAll('.mermaid:not([data-processed])');
        if (!nodes.length) return;
        try { window.mermaid.run({ nodes: nodes }); }
        catch (e) { console.warn('mermaid render failed:', e); }
      }

      /* 읽음 표시 — localStorage 기반 (시크릿 모드 안전) */
      var READ_KEY = 'wtt:read-articles';
      var READ_MAX = 200;

      function getReadSlugs() {
        try {
          var v = JSON.parse(localStorage.getItem(READ_KEY) || '[]');
          return Array.isArray(v) ? v : [];
        } catch (e) { return []; }
      }

      function markAsRead(slug) {
        if (!slug) return;
        try {
          var read = getReadSlugs().filter(function (s) { return s !== slug; });
          read.unshift(slug);
          if (read.length > READ_MAX) read = read.slice(0, READ_MAX);
          localStorage.setItem(READ_KEY, JSON.stringify(read));
        } catch (e) { /* ignore */ }
      }

      /* 본문 종료 후 보조 섹션(.related-articles, .article-nav) 삽입 — 댓글 섹션 앞 */
      function insertAuxSection(node) {
        var comments = document.querySelector('.comments-section');
        if (comments && comments.parentNode) {
          comments.parentNode.insertBefore(node, comments);
          return;
        }
        var main = document.querySelector('.article-main');
        if (main) main.appendChild(node);
      }

      function relatedScore(current, candidate) {
        if (!candidate || candidate.slug === current.slug) return -Infinity;
        var tagSet = {};
        (current.tags || []).forEach(function (t) { tagSet[t] = true; });
        var overlap = 0;
        (candidate.tags || []).forEach(function (t) { if (tagSet[t]) overlap++; });
        if (overlap === 0) return -Infinity;
        var d1 = new Date(current.date).getTime();
        var d2 = new Date(candidate.date).getTime();
        var dateDiff = isFinite(d1) && isFinite(d2) ? Math.abs(d1 - d2) / 86400000 : 0;
        var freshness = Math.max(0, 1 - dateDiff / 365);
        return overlap * 2 + freshness;
      }

      function renderRelatedArticles(current, all) {
        if (!current || !Array.isArray(all) || all.length === 0) return;
        var scored = all
          .map(function (c) { return { article: c, score: relatedScore(current, c) }; })
          .filter(function (x) { return x.score > -Infinity; })
          .sort(function (a, b) { return b.score - a.score; })
          .slice(0, 3);
        if (scored.length === 0) return;

        var cardsHtml = scored.map(function (x) {
          var a = x.article;
          var slug = encodeURIComponent(a.slug || '');
          var readClass = isRead(a.slug || '') ? ' is-read' : '';
          var tags = (Array.isArray(a.tags) ? a.tags : []).slice(0, 2);
          var tagHtml = tags.map(function (t) {
            return '<span class="related-card__tag">' + escapeHtml(t) + '</span>';
          }).join('');
          return '' +
            '<a class="related-card' + readClass + '" href="./article.html?slug=' + slug + '">' +
              '<div class="related-card__date">' + escapeHtml(a.date || '') + '</div>' +
              '<div class="related-card__title">' + escapeHtml(a.title || '(제목 없음)') + '</div>' +
              (tagHtml ? '<div class="related-card__tags">' + tagHtml + '</div>' : '') +
            '</a>';
        }).join('');

        var section = document.createElement('section');
        section.className = 'related-articles';
        section.innerHTML =
          '<h2 class="related-articles__title">관련 기사</h2>' +
          '<div class="related-articles__grid">' + cardsHtml + '</div>';

        insertAuxSection(section);
      }

      function renderArticleNav(current, all) {
        if (!current || !Array.isArray(all) || all.length === 0) return;
        var sorted = all.slice().sort(function (a, b) {
          return (b.date || '').localeCompare(a.date || '');
        });
        var idx = -1;
        for (var i = 0; i < sorted.length; i++) {
          if (sorted[i].slug === current.slug) { idx = i; break; }
        }
        if (idx === -1) return;
        var prev = sorted[idx + 1] || null;  // 더 오래된 글
        var next = sorted[idx - 1] || null;  // 더 최신 글
        if (!prev && !next) return;

        function linkHtml(article, dirClass, label) {
          var slug = encodeURIComponent(article.slug || '');
          return '' +
            '<a class="article-nav__link ' + dirClass + '" href="./article.html?slug=' + slug + '">' +
              '<div class="article-nav__label">' + label + '</div>' +
              '<div class="article-nav__date">' + escapeHtml(article.date || '') + '</div>' +
              '<div class="article-nav__title">' + escapeHtml(article.title || '(제목 없음)') + '</div>' +
            '</a>';
        }

        var prevHtml = prev
          ? linkHtml(prev, 'article-nav__link--prev', '← 이전 기사')
          : '<div class="article-nav__spacer" aria-hidden="true"></div>';
        var nextHtml = next
          ? linkHtml(next, 'article-nav__link--next', '다음 기사 →')
          : '<div class="article-nav__spacer" aria-hidden="true"></div>';

        var nav = document.createElement('nav');
        nav.className = 'article-nav';
        nav.setAttribute('aria-label', '이전·다음 기사');
        nav.innerHTML = prevHtml + nextHtml;

        insertAuxSection(nav);
      }

      /* ========== 빠른 인용 도구 (데스크탑 전용) ========== */
      var quoteCtx = { title: '', date: '', bodyEl: null };

      function initQuoteToolbar(opts) {
        // 모바일 비활성 (pointer:coarse 또는 viewport < 768px)
        try {
          if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return;
        } catch (e) {}
        if (window.innerWidth < 768) return;

        quoteCtx.title = (opts && opts.title) || '';
        quoteCtx.date = (opts && opts.date) || '';
        quoteCtx.bodyEl = (opts && opts.bodyEl) || null;

        if (window.__quoteToolbarInit) return;
        window.__quoteToolbarInit = true;

        var toolbar = document.createElement('div');
        toolbar.className = 'quote-toolbar';
        toolbar.id = 'quoteToolbar';
        toolbar.setAttribute('role', 'toolbar');
        toolbar.setAttribute('aria-label', '텍스트 인용 도구');
        toolbar.hidden = true;
        toolbar.innerHTML =
          '<button type="button" class="quote-toolbar__btn" data-action="copy-quote">' +
            '<span class="quote-toolbar__icon" aria-hidden="true">📋</span>' +
            '<span class="quote-toolbar__label">인용 복사</span>' +
          '</button>' +
          '<button type="button" class="quote-toolbar__btn" data-action="copy-link">' +
            '<span class="quote-toolbar__icon" aria-hidden="true">🔗</span>' +
            '<span class="quote-toolbar__label">부분 링크</span>' +
          '</button>' +
          '<button type="button" class="quote-toolbar__btn" data-action="search-google">' +
            '<span class="quote-toolbar__icon" aria-hidden="true">🔍</span>' +
            '<span class="quote-toolbar__label">구글 검색</span>' +
          '</button>';
        document.body.appendChild(toolbar);

        function getSelectionText() {
          var sel = window.getSelection();
          if (!sel || sel.rangeCount === 0) return '';
          return sel.toString().trim();
        }

        function getSelectionRect() {
          var sel = window.getSelection();
          if (!sel || sel.rangeCount === 0) return null;
          var range = sel.getRangeAt(0);
          var rect = range.getBoundingClientRect();
          if (rect.width === 0 && rect.height === 0) return null;
          return rect;
        }

        function isInBody(node) {
          if (!quoteCtx.bodyEl || !node) return false;
          // anchorNode가 text node일 수 있어 parentNode로 올라가며 비교
          while (node) {
            if (node === quoteCtx.bodyEl) return true;
            node = node.parentNode;
          }
          return false;
        }

        function positionToolbar(rect) {
          toolbar.hidden = false;
          var tbRect = toolbar.getBoundingClientRect();
          var tbW = tbRect.width;
          var tbH = tbRect.height;
          var vpW = window.innerWidth;
          var vpH = window.innerHeight;
          var pad = 10;

          var top = rect.top - tbH - 8;
          if (top < pad) top = rect.bottom + 8;
          if (top + tbH > vpH - pad) top = vpH - tbH - pad;

          var left = rect.left + rect.width / 2 - tbW / 2;
          if (left < pad) left = pad;
          if (left + tbW > vpW - pad) left = vpW - tbW - pad;

          toolbar.style.top = top + 'px';
          toolbar.style.left = left + 'px';
        }

        function showToolbar() {
          var sel = window.getSelection();
          if (!sel || sel.rangeCount === 0) { hideToolbar(); return; }
          var text = sel.toString().trim();
          if (text.length < 2) { hideToolbar(); return; }
          if (!isInBody(sel.anchorNode)) { hideToolbar(); return; }
          var rect = getSelectionRect();
          if (!rect) { hideToolbar(); return; }

          positionToolbar(rect);
          requestAnimationFrame(function () {
            toolbar.classList.add('is-visible');
          });
        }

        function hideToolbar() {
          toolbar.classList.remove('is-visible');
          toolbar.hidden = true;
        }

        function flashCopied(btn) {
          var labelEl = btn.querySelector('.quote-toolbar__label');
          var iconEl = btn.querySelector('.quote-toolbar__icon');
          if (!labelEl) return;
          var origLabel = labelEl.textContent;
          var origIconDisplay = iconEl ? iconEl.style.display : '';
          if (iconEl) iconEl.style.display = 'none';
          labelEl.textContent = '✓ 복사됨';
          setTimeout(function () {
            labelEl.textContent = origLabel;
            if (iconEl) iconEl.style.display = origIconDisplay;
          }, 1200);
        }

        function copyText(text) {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            return navigator.clipboard.writeText(text);
          }
          return new Promise(function (resolve, reject) {
            try {
              var ta = document.createElement('textarea');
              ta.value = text;
              ta.setAttribute('readonly', '');
              ta.style.position = 'fixed';
              ta.style.top = '-1000px';
              ta.style.opacity = '0';
              document.body.appendChild(ta);
              ta.select();
              var ok = document.execCommand('copy');
              document.body.removeChild(ta);
              if (ok) resolve(); else reject(new Error('execCommand copy failed'));
            } catch (e) { reject(e); }
          });
        }

        function doCopyQuote(btn) {
          var text = getSelectionText();
          if (text.length < 2) return;
          var baseUrl = window.location.href.split('#')[0];
          var cite = '"' + text + '"\n— ' + quoteCtx.title + ' (' + quoteCtx.date + ')\n' + baseUrl;
          copyText(cite).then(function () { flashCopied(btn); }).catch(function (e) {
            console.warn('인용 복사 실패:', e);
          });
        }

        function doCopyLink(btn) {
          var text = getSelectionText();
          if (text.length < 2) return;
          var fragment;
          if (text.length <= 200) {
            fragment = encodeURIComponent(text);
          } else {
            var words = text.split(/\s+/);
            var start = words.slice(0, 8).join(' ');
            var end = words.slice(-8).join(' ');
            fragment = encodeURIComponent(start) + ',' + encodeURIComponent(end);
          }
          var baseUrl = window.location.href.split('#')[0];
          var linkUrl = baseUrl + '#:~:text=' + fragment;
          copyText(linkUrl).then(function () { flashCopied(btn); }).catch(function (e) {
            console.warn('부분 링크 복사 실패:', e);
          });
        }

        function doSearchGoogle() {
          var text = getSelectionText();
          if (text.length < 2) return;
          var url = 'https://www.google.com/search?q=' + encodeURIComponent(text);
          window.open(url, '_blank', 'noopener,noreferrer');
          hideToolbar();
        }

        toolbar.addEventListener('click', function (e) {
          var btn = e.target.closest('.quote-toolbar__btn');
          if (!btn) return;
          var action = btn.getAttribute('data-action');
          if (action === 'copy-quote') doCopyQuote(btn);
          else if (action === 'copy-link') doCopyLink(btn);
          else if (action === 'search-google') doSearchGoogle();
        });

        document.addEventListener('mouseup', function () {
          setTimeout(showToolbar, 10);
        });

        document.addEventListener('mousedown', function (e) {
          if (toolbar.contains(e.target)) return;
          hideToolbar();
        });

        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') hideToolbar();
        });

        window.addEventListener('scroll', function () {
          if (toolbar.hidden) return;
          var rect = getSelectionRect();
          if (!rect) { hideToolbar(); return; }
          if (rect.bottom < 0 || rect.top > window.innerHeight) {
            hideToolbar();
          } else {
            positionToolbar(rect);
          }
        }, { passive: true });
      }

      function updateMetaTags(article) {
        if (!article) return;
        var title = article.title || '(제목 없음)';
        var summary = article.summary || '주간 기술 트렌드 분석 기사.';
        var url = window.location.href;

        document.title = title + ' | Weekly Tech Trend Analyst';

        function setAttr(selector, attr, value) {
          var el = document.querySelector(selector);
          if (el) el.setAttribute(attr, value);
        }

        setAttr('meta[name="description"]', 'content', summary);
        setAttr('meta[property="og:title"]', 'content', title);
        setAttr('meta[property="og:description"]', 'content', summary);
        setAttr('meta[property="og:url"]', 'content', url);
        setAttr('meta[name="twitter:title"]', 'content', title);
        setAttr('meta[name="twitter:description"]', 'content', summary);
        setAttr('link[rel="canonical"]', 'href', url);
      }

      function renderArticle(meta, markdown) {
        var title = (meta && meta.title) || '(제목 없음)';
        updateMetaTags(meta);

        var tags = Array.isArray(meta && meta.tags) ? meta.tags : [];
        var tagHtml = tags.map(function (t) {
          return '<span>' + escapeHtml(t) + '</span>';
        }).join('');

        var body = stripFrontmatter(markdown);

        if (window.marked && marked.setOptions) {
          marked.setOptions({
            gfm: true,
            breaks: false,
            headerIds: false,
            mangle: false
          });
          // 단일 ~ 가 strikethrough 로 잘못 해석되는 문제 보정
          // (한국어 본문 숫자 범위 "3~8pt" 등이 취소선으로 표시되지 않도록 del 토큰을 텍스트로 환원)
          if (marked.use) {
            marked.use({
              walkTokens: function (token) {
                if (token.type === 'del' && token.raw && token.raw.substr(0, 2) !== '~~') {
                  token.type = 'text';
                  token.text = token.raw;
                  if (token.tokens) { delete token.tokens; }
                }
                // ```mermaid 코드블록 → <pre class="mermaid"> 로 변환 (원본은 data-source 에 보관)
                if (token.type === 'code' && (token.lang || '').toLowerCase().trim() === 'mermaid') {
                  var raw = token.text || '';
                  token.type = 'html';
                  token.pre = true;
                  token.text =
                    '<pre class="mermaid" data-source="' + escapeHtml(raw) + '">' +
                    escapeHtml(raw) +
                    '</pre>';
                }
              }
            });
          }
        }

        var bodyHtml = window.marked ? marked.parse(body) : escapeHtml(body);

        rootEl.innerHTML = '' +
          '<header class="article-header">' +
            '<h1 class="article-title">' + escapeHtml(title) + '</h1>' +
            '<div class="article-meta">' +
              '<span class="article-meta__date">' + escapeHtml((meta && meta.date) || '') + '</span>' +
              (tagHtml ? '<span class="article-meta__tags">' + tagHtml + '</span>' : '') +
            '</div>' +
          '</header>' +
          '<div class="article-body">' + bodyHtml + '</div>';

        var articleBody = rootEl.querySelector('.article-body');
        decorateCallouts(articleBody);
        transformReferences(articleBody);
        decorateExternalLinks(articleBody);
        buildTOC(articleBody);
        setupReadingProgress(articleBody);
        runMermaid();

        try { markAsRead(slug); } catch (e) { console.warn('markAsRead 예외:', e); }
        try { renderRelatedArticles(meta, allArticles); } catch (e) { console.warn('related 렌더 예외:', e); }
        try { renderArticleNav(meta, allArticles); } catch (e) { console.warn('nav 렌더 예외:', e); }
        try { initQuoteToolbar({ title: title, date: (meta && meta.date) || '', bodyEl: articleBody }); } catch (e) { console.warn('quote toolbar init 예외:', e); }
        try { initCusdis(slug, title); } catch (e) { console.warn('Cusdis init 예외:', e); }
      }

      var slug = getSlug();
      if (!slug) {
        showNotFound('기사를 찾을 수 없습니다.');
        return;
      }

      fetch('./articles/index.json', { cache: 'no-cache' })
        .then(function (res) {
          if (!res.ok) throw new Error('index.json fetch 실패');
          return res.json();
        })
        .then(function (data) {
          var list = (data && Array.isArray(data.articles)) ? data.articles : [];
          allArticles = list;  // 관련 기사·이전다음 네비에서 재사용
          var meta = list.find(function (a) { return a.slug === slug; });
          if (!meta) {
            showNotFound('기사를 찾을 수 없습니다.');
            return null;
          }
          return fetch('./articles/' + encodeURIComponent(slug) + '.md', { cache: 'no-cache' })
            .then(function (res) {
              if (!res.ok) throw new Error('markdown fetch 실패: ' + res.status);
              return res.text();
            })
            .then(function (md) {
              renderArticle(meta, md);
            });
        })
        .catch(function (err) {
          console.error(err);
          showNotFound('기사를 불러오지 못했습니다.');
        });
    })();
  </script>

  <script defer src="https://cloud.umami.is/script.js" data-website-id="7d8b07b6-b3b4-4427-8046-96f30f6761b3"></script>
