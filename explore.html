  <script>
    /* 테마 토글 */
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;

      function updateIcon() {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        btn.textContent = current === 'dark' ? '☀' : '🌙';
        btn.setAttribute(
          'aria-label',
          current === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환'
        );
      }

      updateIcon();

      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
        updateIcon();
      });
    })();
  </script>

  <script>
    /* 탐색 (주제별 · 날짜별) */
    (function () {
      'use strict';

      /* 읽음 표시 — localStorage 기반 (시크릿 모드 안전) */
      var READ_KEY = 'wtt:read-articles';
      function getReadSlugs() {
        try {
          var v = JSON.parse(localStorage.getItem(READ_KEY) || '[]');
          return Array.isArray(v) ? v : [];
        } catch (e) { return []; }
      }
      function isRead(slug) {
        return getReadSlugs().indexOf(slug) !== -1;
      }

      /* type이 없는 기존 항목은 daily로 취급 */
      function getType(a) { return (a && a.type) || 'daily'; }

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function normalize(s) {
        return String(s == null ? '' : s)
          .toLowerCase()
          .replace(/\s+/g, ' ')
          .trim();
      }

      function isValidSlug(slug) {
        return /^[A-Za-z0-9._-]+$/.test(slug || '');
      }

      function safeArticleHref(slug) {
        if (!isValidSlug(slug)) return '#';
        return './article.html?slug=' + encodeURIComponent(slug);
      }

      var WEEKDAYS = ['일', '월', '화', '수', '목', '금', '토'];

      function pad2(n) { return (n < 10 ? '0' : '') + n; }

      /* "2026-06-25" -> "2026년 6월 25일" */
      function formatKoreanDate(d) {
        var parts = (d || '').split('-');
        if (parts.length !== 3) return d || '';
        return parts[0] + '년 ' + parseInt(parts[1], 10) + '월 ' + parseInt(parts[2], 10) + '일';
      }

      /* 기사 한 건의 카드 HTML (날짜 + 요약 2줄, 제목 미표시) */
      function cardHtml(a) {
        var readClass = isRead(a.slug || '') ? ' is-read' : '';
        var href = safeArticleHref(a.slug);
        // summary 우선, 없으면(드문 경우) title fallback
        var text = (a.summary && a.summary.trim()) ? a.summary : (a.title || '(요약 없음)');
        return '' +
          '<li class="explore-card' + readClass + '">' +
            '<a class="explore-card__link" href="' + escapeHtml(href) + '">' +
              '<span class="explore-card__date">' + escapeHtml(a.date || '') + '</span>' +
              '<span class="explore-card__summary">' + escapeHtml(text) + '</span>' +
            '</a>' +
          '</li>';
      }

      function articlesListHtml(list) {
        if (!list || list.length === 0) {
          return '<li class="explore-empty">표시할 기사가 없습니다.</li>';
        }
        return list.map(cardHtml).join('');
      }

      var state = {
        articles: [],
        sorted: [],          // 날짜 내림차순 전체
        tagMap: Object.create(null),  // tag -> [articles]
        tagsSorted: [],      // 빈도순 태그 [{tag, count}]
        byDate: Object.create(null),  // "YYYY-MM-DD" -> [articles]
        selectedTag: null,
        tagQuery: '',
        selectedDate: null,
        calYear: 0,
        calMonth: 0,         // 0-based
        minVal: 0,           // year*12+month 최소
        maxVal: 0
      };

      // ----- 엘리먼트 -----
      var modeTopicBtn = document.getElementById('mode-topic');
      var modeDateBtn = document.getElementById('mode-date');
      var panelTopic = document.getElementById('panel-topic');
      var panelDate = document.getElementById('panel-date');

      var tagSearchWrap = document.getElementById('tag-search');
      var tagSearchInput = document.getElementById('tag-search-input');
      var tagSearchClear = document.getElementById('tag-search-clear');
      var taglistEl = document.getElementById('taglist');
      var topicHeadEl = document.getElementById('topic-head');
      var topicArticlesEl = document.getElementById('topic-articles');

      var calendarEl = document.getElementById('calendar');
      var dateHeadEl = document.getElementById('date-head');
      var dateArticlesEl = document.getElementById('date-articles');

      var tagDebounce = null;

      // ===================== 모드 토글 =====================
      function setMode(mode) {
        var topic = mode === 'topic';
        modeTopicBtn.classList.toggle('is-active', topic);
        modeDateBtn.classList.toggle('is-active', !topic);
        modeTopicBtn.setAttribute('aria-selected', topic ? 'true' : 'false');
        modeDateBtn.setAttribute('aria-selected', topic ? 'false' : 'true');
        panelTopic.hidden = !topic;
        panelDate.hidden = topic;
      }

      // ===================== 주제별 =====================
      function buildTagData() {
        var map = Object.create(null);
        state.sorted.forEach(function (a) {
          (a.tags || []).forEach(function (t) {
            if (!t) return;
            if (!map[t]) map[t] = [];
            map[t].push(a);
          });
        });
        state.tagMap = map;

        var entries = Object.keys(map).map(function (t) {
          return { tag: t, count: map[t].length };
        });
        // 빈도 내림차순, 동률은 가나다순
        entries.sort(function (a, b) {
          if (b.count !== a.count) return b.count - a.count;
          return a.tag.localeCompare(b.tag, 'ko');
        });
        state.tagsSorted = entries;
      }

      function renderTagList() {
        var q = normalize(state.tagQuery);
        var visible = state.tagsSorted.filter(function (e) {
          return !q || normalize(e.tag).indexOf(q) !== -1;
        });

        if (visible.length === 0) {
          taglistEl.innerHTML = '<li class="taglist__empty">일치하는 태그가 없습니다.</li>';
          return;
        }

        var html = visible.map(function (e) {
          var active = (e.tag === state.selectedTag) ? ' is-active' : '';
          var pressed = (e.tag === state.selectedTag) ? 'true' : 'false';
          return '' +
            '<li class="taglist__item">' +
              '<button type="button" class="taglist__btn' + active + '" ' +
                'data-tag="' + escapeHtml(e.tag) + '" aria-pressed="' + pressed + '">' +
                '<span class="taglist__name">' + escapeHtml(e.tag) + '</span>' +
                '<span class="taglist__count">' + e.count + '</span>' +
              '</button>' +
            '</li>';
        }).join('');
        taglistEl.innerHTML = html;
      }

      function renderTopicArticles() {
        var tag = state.selectedTag;
        if (!tag || !state.tagMap[tag]) {
          topicHeadEl.textContent = '';
          topicArticlesEl.innerHTML = '<li class="explore-empty">태그를 선택하세요.</li>';
          return;
        }
        var list = state.tagMap[tag].slice().sort(function (a, b) {
          return (b.date || '').localeCompare(a.date || '');
        });
        topicHeadEl.innerHTML =
          escapeHtml(tag) +
          '<span class="explore-result__count">' + list.length + '건</span>';
        topicArticlesEl.innerHTML = articlesListHtml(list);
      }

      function selectTag(tag) {
        state.selectedTag = tag;
        // 활성 표시만 갱신 (목록 전체 재렌더는 검색 시에만)
        var btns = taglistEl.querySelectorAll('.taglist__btn');
        btns.forEach(function (b) {
          var on = b.getAttribute('data-tag') === tag;
          b.classList.toggle('is-active', on);
          b.setAttribute('aria-pressed', on ? 'true' : 'false');
        });
        renderTopicArticles();
      }

      function onTagListClick(e) {
        var btn = e.target.closest('.taglist__btn');
        if (!btn) return;
        var tag = btn.getAttribute('data-tag');
        if (tag) selectTag(tag);
      }

      function onTagSearchInput() {
        var val = tagSearchInput.value || '';
        if (val) tagSearchWrap.classList.add('is-active');
        else tagSearchWrap.classList.remove('is-active');
        if (tagDebounce) clearTimeout(tagDebounce);
        tagDebounce = setTimeout(function () {
          state.tagQuery = val;
          renderTagList();
        }, 200);
      }

      function onTagSearchClear() {
        tagSearchInput.value = '';
        state.tagQuery = '';
        tagSearchWrap.classList.remove('is-active');
        renderTagList();
        tagSearchInput.focus();
      }

      // ===================== 날짜별 =====================
      function buildDateData() {
        var map = Object.create(null);
        state.sorted.forEach(function (a) {
          var d = a.date || '';
          if (!d) return;
          if (!map[d]) map[d] = [];
          map[d].push(a);
        });
        state.byDate = map;

        // 발행 월 범위 계산
        var dates = Object.keys(map).sort();
        var first = dates[0];
        var last = dates[dates.length - 1];
        var fy = parseInt(first.slice(0, 4), 10);
        var fm = parseInt(first.slice(5, 7), 10) - 1;
        var ly = parseInt(last.slice(0, 4), 10);
        var lm = parseInt(last.slice(5, 7), 10) - 1;
        state.minVal = fy * 12 + fm;
        state.maxVal = ly * 12 + lm;
      }

      function renderCalendar() {
        var year = state.calYear;
        var month = state.calMonth; // 0-based
        var curVal = year * 12 + month;

        var todayStr = '';
        try {
          var t = new Date();
          todayStr = t.getFullYear() + '-' + pad2(t.getMonth() + 1) + '-' + pad2(t.getDate());
        } catch (e) {}

        var firstDow = new Date(year, month, 1).getDay();      // 0(일)~6(토)
        var daysInMonth = new Date(year, month + 1, 0).getDate();

        var canPrev = curVal > state.minVal;
        var canNext = curVal < state.maxVal;

        var head = '' +
          '<div class="calendar__header">' +
            '<button type="button" class="calendar__nav" id="cal-prev" aria-label="이전 달"' +
              (canPrev ? '' : ' disabled') + '>‹</button>' +
            '<span class="calendar__title">' + year + '.' + (month + 1) + '</span>' +
            '<button type="button" class="calendar__nav" id="cal-next" aria-label="다음 달"' +
              (canNext ? '' : ' disabled') + '>›</button>' +
          '</div>';

        var wd = '<div class="calendar__grid">' +
          WEEKDAYS.map(function (w) {
            return '<div class="calendar__wd">' + w + '</div>';
          }).join('');

        var cells = '';
        // 앞쪽 다른 달 채우기
        for (var i = 0; i < firstDow; i++) {
          cells += '<div class="cal-day cal-day--out"></div>';
        }
        // 이번 달 날짜
        for (var d = 1; d <= daysInMonth; d++) {
          var dateStr = year + '-' + pad2(month + 1) + '-' + pad2(d);
          var isToday = (dateStr === todayStr) ? ' cal-day--today' : '';
          if (state.byDate[dateStr]) {
            var sel = (dateStr === state.selectedDate) ? ' cal-day--selected' : '';
            cells += '<button type="button" class="cal-day cal-day--published' + sel + isToday + '" ' +
              'data-date="' + dateStr + '" aria-label="' + formatKoreanDate(dateStr) + ' 기사 보기"' +
              (sel ? ' aria-current="date"' : '') + '>' + d + '</button>';
          } else {
            cells += '<div class="cal-day cal-day--empty' + isToday + '">' + d + '</div>';
          }
        }
        // 뒤쪽 다른 달 채우기 — 6주(42칸) 맞춤
        var used = firstDow + daysInMonth;
        var trailing = (7 - (used % 7)) % 7;
        var total = used + trailing;
        while (total < 42) { trailing += 7; total += 7; }
        for (var j = 0; j < trailing; j++) {
          cells += '<div class="cal-day cal-day--out"></div>';
        }

        calendarEl.innerHTML = head + wd + cells + '</div>';

        var prevBtn = document.getElementById('cal-prev');
        var nextBtn = document.getElementById('cal-next');
        if (prevBtn && canPrev) prevBtn.addEventListener('click', function () { stepMonth(-1); });
        if (nextBtn && canNext) nextBtn.addEventListener('click', function () { stepMonth(1); });
      }

      function stepMonth(delta) {
        var v = state.calYear * 12 + state.calMonth + delta;
        if (v < state.minVal) v = state.minVal;
        if (v > state.maxVal) v = state.maxVal;
        state.calYear = Math.floor(v / 12);
        state.calMonth = v % 12;
        renderCalendar();
      }

      function renderDateArticles() {
        var d = state.selectedDate;
        if (!d || !state.byDate[d]) {
          dateHeadEl.textContent = '';
          dateArticlesEl.innerHTML = '<li class="explore-empty">날짜를 선택하세요.</li>';
          return;
        }
        var list = state.byDate[d].slice(); // index.json 순서 유지
        dateHeadEl.innerHTML =
          escapeHtml(formatKoreanDate(d)) +
          '<span class="explore-result__count">' + list.length + '건</span>';
        dateArticlesEl.innerHTML = articlesListHtml(list);
      }

      function selectDate(dateStr) {
        if (!state.byDate[dateStr]) return;
        state.selectedDate = dateStr;
        renderCalendar();        // 선택 강조 갱신
        renderDateArticles();
      }

      function onCalendarClick(e) {
        var cell = e.target.closest('.cal-day--published');
        if (!cell) return;
        var d = cell.getAttribute('data-date');
        if (d) selectDate(d);
      }

      // ===================== 초기화 =====================
      function init(articles) {
        state.articles = articles;
        state.sorted = articles.slice().sort(function (a, b) {
          return (b.date || '').localeCompare(a.date || '');
        });

        // 주제별
        buildTagData();
        renderTagList();
        if (state.tagsSorted.length > 0) {
          state.selectedTag = state.tagsSorted[0].tag;
          renderTagList();       // 활성 반영
        }
        renderTopicArticles();

        // 날짜별
        buildDateData();
        var latest = state.sorted.length > 0 ? state.sorted[0].date : null;
        if (latest) {
          state.selectedDate = latest;
          state.calYear = parseInt(latest.slice(0, 4), 10);
          state.calMonth = parseInt(latest.slice(5, 7), 10) - 1;
        } else {
          var now = new Date();
          state.calYear = now.getFullYear();
          state.calMonth = now.getMonth();
        }
        renderCalendar();
        renderDateArticles();

        // 이벤트 바인딩
        modeTopicBtn.addEventListener('click', function () { setMode('topic'); });
        modeDateBtn.addEventListener('click', function () { setMode('date'); });
        taglistEl.addEventListener('click', onTagListClick);
        tagSearchInput.addEventListener('input', onTagSearchInput);
        tagSearchClear.addEventListener('click', onTagSearchClear);
        calendarEl.addEventListener('click', onCalendarClick);
      }

      fetch('./articles/index.json', { cache: 'no-cache' })
        .then(function (res) {
          if (!res.ok) throw new Error('index.json fetch 실패: ' + res.status);
          return res.json();
        })
        .then(function (data) {
          var all = (data && Array.isArray(data.articles)) ? data.articles : [];
          /* 탐색은 일일 브리핑(daily) 전용 — 태그·달력 집계에서 weekly/monthly/china/production 제외
             (중국·종합·생산기술 기사 태그가 일일 브리핑 탐색을 오염시키지 않도록) */
          var list = all.filter(function (a) { return getType(a) === 'daily'; });
          if (list.length === 0) {
            taglistEl.innerHTML = '<li class="taglist__empty">등록된 기사가 없습니다.</li>';
            topicArticlesEl.innerHTML = '<li class="explore-empty">등록된 기사가 없습니다.</li>';
            dateArticlesEl.innerHTML = '<li class="explore-empty">등록된 기사가 없습니다.</li>';
            return;
          }
          init(list);
        })
        .catch(function (err) {
          console.error(err);
          taglistEl.innerHTML =
            '<li class="taglist__empty">목록을 불러오지 못했습니다. 정적 서버(예: <code>python -m http.server</code>)로 실행해주세요.</li>';
          topicArticlesEl.innerHTML = '';
          dateArticlesEl.innerHTML = '';
        });
    })();
  </script>
