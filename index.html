  <script>
    /* 테마 토글 */
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;

      function updateIcon() {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        btn.textContent = current === 'dark' ? '☀' : '🌙';
        btn.setAttribute(
          'aria-label',
          current === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환'
        );
      }

      updateIcon();

      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
        updateIcon();
      });
    })();
  </script>

  <script>
    /* 기사 목록 + 검색 */
    (function () {
      'use strict';

      /* 읽음 표시 — localStorage 기반 (시크릿 모드 안전) */
      var READ_KEY = 'wtt:read-articles';
      function getReadSlugs() {
        try {
          var v = JSON.parse(localStorage.getItem(READ_KEY) || '[]');
          return Array.isArray(v) ? v : [];
        } catch (e) { return []; }
      }
      function isRead(slug) {
        return getReadSlugs().indexOf(slug) !== -1;
      }

      /* type이 없는 기존 항목은 daily로 취급 */
      function getType(a) { return (a && a.type) || 'daily'; }

      var listEl = document.getElementById('article-list');
      var searchWrapEl = document.getElementById('filter-search');
      var searchInputEl = document.getElementById('filter-search-input');
      var searchClearEl = document.getElementById('filter-search-clear');
      var countEl = document.getElementById('filter-count');

      var state = {
        articles: [],
        sortedArticles: [],
        query: ''
      };

      var debounceTimer = null;

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function normalize(s) {
        return String(s == null ? '' : s)
          .toLowerCase()
          .replace(/\s+/g, ' ')
          .trim();
      }

      function isFilterActive() {
        return state.query !== '';
      }

      function getFiltered() {
        var q = normalize(state.query);
        if (!q) return state.sortedArticles.slice();
        return state.sortedArticles.filter(function (a) {
          var hay = normalize(
            (a.title || '') + ' ' +
            (a.summary || '') + ' ' +
            (Array.isArray(a.tags) ? a.tags.join(' ') : '')
          );
          return hay.indexOf(q) !== -1;
        });
      }

      function renderEmpty() {
        listEl.innerHTML =
          '<li class="empty-results">' +
            '<p class="empty-results__message">검색 결과가 없습니다</p>' +
            '<button type="button" class="empty-results__reset" id="empty-results-reset">필터 초기화</button>' +
          '</li>';
        var btn = document.getElementById('empty-results-reset');
        if (btn) btn.addEventListener('click', resetFilters);
      }

      function renderList(filtered) {
        if (filtered.length === 0) { renderEmpty(); return; }

        var html = filtered.map(function (a) {
          var slug = encodeURIComponent(a.slug || '');
          var tags = Array.isArray(a.tags) ? a.tags : [];
          var tagHtml = tags.map(function (t) {
            return '<span>' + escapeHtml(t) + '</span>';
          }).join('');
          var readClass = isRead(a.slug || '') ? ' is-read' : '';
          return '' +
            '<li class="article-card' + readClass + '">' +
              '<p class="article-card__date">' + escapeHtml(a.date || '') + '</p>' +
              '<h2 class="article-card__title">' +
                '<a href="./article.html?slug=' + slug + '">' + escapeHtml(a.title || '(제목 없음)') + '</a>' +
              '</h2>' +
              '<p class="article-card__summary">' + escapeHtml(a.summary || '') + '</p>' +
              (tagHtml ? '<p class="article-card__tags">' + tagHtml + '</p>' : '') +
            '</li>';
        }).join('');
        listEl.innerHTML = html;
      }

      function updateCount(filtered) {
        if (!isFilterActive()) {
          countEl.hidden = true;
          countEl.textContent = '';
          return;
        }
        countEl.hidden = false;
        countEl.textContent =
          '전체 ' + state.sortedArticles.length + '편 중 ' + filtered.length + '편 표시';
      }

      function updateClearVisibility() {
        if (state.query) searchWrapEl.classList.add('is-active');
        else searchWrapEl.classList.remove('is-active');
      }

      function render() {
        var filtered = getFiltered();
        updateClearVisibility();
        updateCount(filtered);
        renderList(filtered);
      }

      function resetFilters() {
        state.query = '';
        searchInputEl.value = '';
        render();
        searchInputEl.focus();
      }

      function onSearchInput() {
        if (debounceTimer) clearTimeout(debounceTimer);
        var val = searchInputEl.value || '';
        debounceTimer = setTimeout(function () {
          state.query = val;
          render();
        }, 200);
        // X 버튼 즉시 반영
        if (val) searchWrapEl.classList.add('is-active');
        else searchWrapEl.classList.remove('is-active');
      }

      function onSearchKeydown(e) {
        if (e.key === 'Escape') {
          e.preventDefault();
          resetFilters();
        }
      }

      function onClearClick() {
        state.query = '';
        searchInputEl.value = '';
        render();
        searchInputEl.focus();
      }

      function init(articles) {
        state.articles = articles || [];
        state.sortedArticles = state.articles.slice().sort(function (a, b) {
          return (b.date || '').localeCompare(a.date || '');
        });

        render();

        searchInputEl.addEventListener('input', onSearchInput);
        searchInputEl.addEventListener('keydown', onSearchKeydown);
        searchClearEl.addEventListener('click', onClearClick);
      }

      fetch('./articles/index.json', { cache: 'no-cache' })
        .then(function (res) {
          if (!res.ok) throw new Error('index.json fetch 실패: ' + res.status);
          return res.json();
        })
        .then(function (data) {
          var all = (data && Array.isArray(data.articles)) ? data.articles : [];
          /* 일일 브리핑 탭 — daily 기사만 표시 (weekly/monthly/china 제외) */
          var list = all.filter(function (a) { return getType(a) === 'daily'; });
          if (list.length === 0) {
            listEl.innerHTML = '<li class="notice">등록된 기사가 없습니다.</li>';
            return;
          }
          init(list);
        })
        .catch(function (err) {
          console.error(err);
          listEl.innerHTML = '<li class="notice">기사 목록을 불러오지 못했습니다. 로컬에서 보고 있다면 정적 서버(예: <code>python -m http.server</code>)로 실행해주세요.</li>';
        });
    })();
  </script>
