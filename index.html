  <script>
    /* FOUC 방지: 본문 렌더 이전에 테마 즉시 적용 */
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

<body>
  <main class="wrap wrap--list">
    <header class="site-header">
      <div class="site-header__main">
        <h1 class="site-title"><a href="./index.html">Weekly Tech Trend Analyst</a></h1>
        <p class="site-subtitle">주간 기술 트렌드 분석</p>
        <nav class="site-nav" aria-label="사이트 네비게이션">
          <a class="site-nav__link is-active" href="./index.html" aria-current="page">홈</a>
          <span class="site-nav__sep" aria-hidden="true">·</span>
          <a class="site-nav__link" href="./archive.html">아카이브</a>
        </nav>
      </div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="테마 전환">🌙</button>
    </header>

    <section class="filter-bar" aria-label="기사 필터">
      <div class="filter-search" id="filter-search">
        <input
          type="search"
          id="filter-search-input"
          class="filter-search__input"
          placeholder="기사 검색 (제목·요약·태그)"
          autocomplete="off"
          aria-label="기사 검색 (제목·요약·태그)"
        />
        <button
          type="button"
          id="filter-search-clear"
          class="filter-search__clear"
          aria-label="검색어 지우기"
        >✕</button>
      </div>
      <div class="filter-tags" role="group" aria-label="태그 필터">
        <div class="filter-tags__list" id="filterTagsList"></div>
        <button
          class="filter-tags__toggle"
          id="filterTagsToggle"
          type="button"
          aria-label="모든 태그 보기"
          aria-expanded="false"
        >
          <span class="filter-tags__toggle-icon" aria-hidden="true">▼</span>
        </button>
      </div>
    </section>

    <p id="filter-count" class="filter-count" hidden></p>

    <ul id="article-list" class="article-list">
      <li class="notice">기사를 불러오는 중입니다…</li>
    </ul>

    <footer class="site-footer">Powered by Claude × GitHub Pages</footer>
  </main>

  <script>
    /* 테마 토글 */
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;

      function updateIcon() {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        btn.textContent = current === 'dark' ? '☀' : '🌙';
        btn.setAttribute(
          'aria-label',
          current === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환'
        );
      }

      updateIcon();

      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
        updateIcon();
      });
    })();
  </script>

  <script>
    /* 기사 목록 + 검색 + 태그 필터 */
    (function () {
      'use strict';

      /* 읽음 표시 — localStorage 기반 (시크릿 모드 안전) */
      var READ_KEY = 'wtt:read-articles';
      function getReadSlugs() {
        try {
          var v = JSON.parse(localStorage.getItem(READ_KEY) || '[]');
          return Array.isArray(v) ? v : [];
        } catch (e) { return []; }
      }
      function isRead(slug) {
        return getReadSlugs().indexOf(slug) !== -1;
      }

      var listEl = document.getElementById('article-list');
      var searchWrapEl = document.getElementById('filter-search');
      var searchInputEl = document.getElementById('filter-search-input');
      var searchClearEl = document.getElementById('filter-search-clear');
      var tagsEl = document.getElementById('filterTagsList');
      var countEl = document.getElementById('filter-count');

      var state = {
        articles: [],
        sortedArticles: [],
        query: '',
        tags: new Set()
      };

      var debounceTimer = null;

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function normalize(s) {
        return String(s == null ? '' : s)
          .toLowerCase()
          .replace(/\s+/g, ' ')
          .trim();
      }

      function isFilterActive() {
        return state.query !== '' || state.tags.size > 0;
      }

      function uniqueSortedTags(articles) {
        var seen = Object.create(null);
        articles.forEach(function (a) {
          (a.tags || []).forEach(function (t) {
            if (t) seen[t] = true;
          });
        });
        return Object.keys(seen).sort(function (a, b) {
          return a.localeCompare(b, 'ko');
        });
      }

      function renderTagChips(tags) {
        var html = tags.map(function (t) {
          var active = state.tags.has(t) ? ' is-active' : '';
          var pressed = state.tags.has(t) ? 'true' : 'false';
          return '<button type="button" class="tag-chip' + active +
            '" data-tag="' + escapeHtml(t) +
            '" aria-pressed="' + pressed + '">' +
            escapeHtml(t) + '</button>';
        }).join('');
        tagsEl.innerHTML = html;
      }

      function refreshTagChipsActive() {
        var nodes = tagsEl.querySelectorAll('.tag-chip');
        nodes.forEach(function (n) {
          var t = n.getAttribute('data-tag');
          if (state.tags.has(t)) {
            n.classList.add('is-active');
            n.setAttribute('aria-pressed', 'true');
          } else {
            n.classList.remove('is-active');
            n.setAttribute('aria-pressed', 'false');
          }
        });
      }

      function getFiltered() {
        var q = normalize(state.query);
        var anyTag = state.tags.size > 0;
        return state.sortedArticles.filter(function (a) {
          if (q) {
            var hay = normalize(
              (a.title || '') + ' ' +
              (a.summary || '') + ' ' +
              (Array.isArray(a.tags) ? a.tags.join(' ') : '')
            );
            if (hay.indexOf(q) === -1) return false;
          }
          if (anyTag) {
            var tags = Array.isArray(a.tags) ? a.tags : [];
            var matched = false;
            for (var i = 0; i < tags.length; i++) {
              if (state.tags.has(tags[i])) { matched = true; break; }
            }
            if (!matched) return false;
          }
          return true;
        });
      }

      function renderEmpty() {
        listEl.innerHTML =
          '<li class="empty-results">' +
            '<p class="empty-results__message">검색 결과가 없습니다</p>' +
            '<button type="button" class="empty-results__reset" id="empty-results-reset">필터 초기화</button>' +
          '</li>';
        var btn = document.getElementById('empty-results-reset');
        if (btn) btn.addEventListener('click', resetFilters);
      }

      function renderList(filtered) {
        if (filtered.length === 0) { renderEmpty(); return; }

        var html = filtered.map(function (a) {
          var slug = encodeURIComponent(a.slug || '');
          var tags = Array.isArray(a.tags) ? a.tags : [];
          var tagHtml = tags.map(function (t) {
            return '<span>' + escapeHtml(t) + '</span>';
          }).join('');
          var readClass = isRead(a.slug || '') ? ' is-read' : '';
          return '' +
            '<li class="article-card' + readClass + '">' +
              '<p class="article-card__date">' + escapeHtml(a.date || '') + '</p>' +
              '<h2 class="article-card__title">' +
                '<a href="./article.html?slug=' + slug + '">' + escapeHtml(a.title || '(제목 없음)') + '</a>' +
              '</h2>' +
              '<p class="article-card__summary">' + escapeHtml(a.summary || '') + '</p>' +
              (tagHtml ? '<p class="article-card__tags">' + tagHtml + '</p>' : '') +
            '</li>';
        }).join('');
        listEl.innerHTML = html;
      }

      function updateCount(filtered) {
        if (!isFilterActive()) {
          countEl.hidden = true;
          countEl.textContent = '';
          return;
        }
        countEl.hidden = false;
        countEl.textContent =
          '전체 ' + state.sortedArticles.length + '편 중 ' + filtered.length + '편 표시';
      }

      function updateClearVisibility() {
        if (state.query) searchWrapEl.classList.add('is-active');
        else searchWrapEl.classList.remove('is-active');
      }

      function render() {
        var filtered = getFiltered();
        updateClearVisibility();
        updateCount(filtered);
        renderList(filtered);
      }

      function resetFilters() {
        state.query = '';
        state.tags.clear();
        searchInputEl.value = '';
        refreshTagChipsActive();
        render();
        searchInputEl.focus();
      }

      function onSearchInput() {
        if (debounceTimer) clearTimeout(debounceTimer);
        var val = searchInputEl.value || '';
        debounceTimer = setTimeout(function () {
          state.query = val;
          render();
        }, 200);
        // X 버튼 즉시 반영
        if (val) searchWrapEl.classList.add('is-active');
        else searchWrapEl.classList.remove('is-active');
      }

      function onSearchKeydown(e) {
        if (e.key === 'Escape') {
          e.preventDefault();
          resetFilters();
        }
      }

      function onTagClick(e) {
        var btn = e.target.closest('.tag-chip');
        if (!btn) return;
        var tag = btn.getAttribute('data-tag');
        if (!tag) return;
        if (state.tags.has(tag)) state.tags.delete(tag);
        else state.tags.add(tag);
        refreshTagChipsActive();
        render();
      }

      function onClearClick() {
        state.query = '';
        searchInputEl.value = '';
        render();
        searchInputEl.focus();
      }

      function initFilterTagsToggle() {
        var toggle = document.getElementById('filterTagsToggle');
        var list = document.getElementById('filterTagsList');
        if (!toggle || !list) return;

        // 태그 수가 적어 1행에 다 들어가면 토글 자체를 숨김
        // 페이지 로드 후 약간의 지연을 두고 측정 (폰트·태그 렌더 완료 후)
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            if (list.scrollHeight <= list.clientHeight + 2) {
              toggle.style.display = 'none';
            }
          });
        });

        toggle.addEventListener('click', function () {
          var expanded = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', String(!expanded));
          toggle.setAttribute('aria-label', expanded ? '모든 태그 보기' : '태그 접기');
          list.classList.toggle('is-expanded');
        });
      }

      function init(articles) {
        state.articles = articles || [];
        state.sortedArticles = state.articles.slice().sort(function (a, b) {
          return (b.date || '').localeCompare(a.date || '');
        });

        renderTagChips(uniqueSortedTags(state.sortedArticles));
        render();

        searchInputEl.addEventListener('input', onSearchInput);
        searchInputEl.addEventListener('keydown', onSearchKeydown);
        searchClearEl.addEventListener('click', onClearClick);
        tagsEl.addEventListener('click', onTagClick);

        initFilterTagsToggle();
      }

      fetch('./articles/index.json', { cache: 'no-cache' })
        .then(function (res) {
          if (!res.ok) throw new Error('index.json fetch 실패: ' + res.status);
          return res.json();
        })
        .then(function (data) {
          var list = (data && Array.isArray(data.articles)) ? data.articles : [];
          if (list.length === 0) {
            listEl.innerHTML = '<li class="notice">등록된 기사가 없습니다.</li>';
            return;
          }
          init(list);
        })
        .catch(function (err) {
          console.error(err);
          listEl.innerHTML = '<li class="notice">기사 목록을 불러오지 못했습니다. 로컬에서 보고 있다면 정적 서버(예: <code>python -m http.server</code>)로 실행해주세요.</li>';
        });
    })();
  </script>
